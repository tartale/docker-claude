name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been automatically marked as stale because it has had no activity for 60 days. It will be closed in 7 days unless there is new activity.'
          stale-pr-message: 'This pull request has been automatically marked as stale because it has had no activity for 30 days. It will be closed in 7 days unless there is new activity.'
          close-issue-message: 'This issue was closed automatically after 67 days of inactivity.'
          close-pr-message: 'This pull request was closed automatically after 37 days of inactivity.'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
