name: Publish Docker Images

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Claude version
        id: claude-version
        run: echo "version=$(npm view @anthropic-ai/claude-code version 2>/dev/null || echo latest)" >> $GITHUB_OUTPUT

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: tartale/claude-sandbox:latest
          build-args: CLAUDE_VERSION=${{ steps.claude-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push language variants
        run: |
          for plugin in plugins/languages/*.sh; do
            lang=$(basename "$plugin" .sh)
            echo "Building $lang..."
            docker buildx build --platform linux/amd64,linux/arm64 --push \
              -t tartale/claude-sandbox:$lang \
              --build-arg PLUGINS=plugins/languages/$lang.sh \
              --build-arg CLAUDE_VERSION=${{ steps.claude-version.outputs.version }} \
              .
          done

      - name: Tag images with version numbers
        run: ./tag-images.sh all
        env:
          CLAUDE_VERSION: ${{ steps.claude-version.outputs.version }}
